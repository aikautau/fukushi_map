<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>大阪府枚方市 介護事業所マップ｜hukushimap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10/ol.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav id="nav1" class="navbar navbar-expand-lg px-3 py-2">
    <span class="navbar-brand mb-0">
      <i class="bi bi-geo-alt-fill"></i> 枚方市 介護事業所マップ
    </span>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent" aria-label="メニューを開閉">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navContent">
      <ul class="navbar-nav me-auto flex-row flex-wrap gap-1 mt-1 mt-lg-0" role="group" aria-label="表示カテゴリ">
        <li class="nav-item d-flex align-items-center gap-1">
          <span class="legend-group-label">介護</span>
          <button type="button" class="btn btn-sm btn-outline-secondary legend-group-btn" id="btnCareAllOn" aria-label="介護を全て表示">全</button>
          <button type="button" class="btn btn-sm btn-outline-secondary legend-group-btn" id="btnCareAllOff" aria-label="介護を全て非表示">無</button>
        </li>
        <li class="nav-item"><label class="legend-chip"><input type="checkbox" id="cbKyotaku" checked> <span class="legend-dot" style="background:#4CAF50"></span> 居宅支援</label></li>
        <li class="nav-item"><label class="legend-chip"><input type="checkbox" id="cbDay" checked> <span class="legend-dot" style="background:#FF9800"></span> デイ</label></li>
        <li class="nav-item"><label class="legend-chip"><input type="checkbox" id="cbRiha" checked> <span class="legend-dot" style="background:#2196F3"></span> リハ</label></li>
        <li class="nav-item"><label class="legend-chip"><input type="checkbox" id="cbHoumon" checked> <span class="legend-dot" style="background:#9C27B0"></span> 訪問</label></li>
        <li class="nav-item"><label class="legend-chip"><input type="checkbox" id="cbTakinou" checked> <span class="legend-dot" style="background:#F44336"></span> 多機能</label></li>
        <li class="nav-item"><label class="legend-chip"><input type="checkbox" id="cbTanki" checked> <span class="legend-dot" style="background:#00BCD4"></span> 短期</label></li>
        <li class="nav-item"><label class="legend-chip"><input type="checkbox" id="cbShisetsu" checked> <span class="legend-dot" style="background:#795548"></span> 施設</label></li>
        <li class="nav-item"><label class="legend-chip"><input type="checkbox" id="cbYougu" checked> <span class="legend-dot" style="background:#607D8B"></span> 用具</label></li>
        <li class="nav-item ms-lg-2 d-flex align-items-center gap-1">
          <span class="legend-group-label">医療</span>
          <button type="button" class="btn btn-sm btn-outline-secondary legend-group-btn" id="btnMedAllOn" aria-label="医療を全て表示">全</button>
          <button type="button" class="btn btn-sm btn-outline-secondary legend-group-btn" id="btnMedAllOff" aria-label="医療を全て非表示">無</button>
        </li>
        <li class="nav-item"><label class="legend-chip"><input type="checkbox" id="cbMedHospital"> <span class="legend-shape legend-cross" style="color:#B71C1C"></span> 病院</label></li>
        <li class="nav-item"><label class="legend-chip"><input type="checkbox" id="cbMedClinic"> <span class="legend-shape legend-square-red" style="background:#E53935"></span> 医院</label></li>
        <li class="nav-item"><label class="legend-chip"><input type="checkbox" id="cbMedDental"> <span class="legend-shape legend-diamond" style="background:#EC407A"></span> 歯科</label></li>
        <li class="nav-item ms-lg-2"><label class="legend-chip"><input type="checkbox" id="cbArea" checked> <span class="legend-square" style="border-color:#1BA466"></span> 圏域</label></li>
        <li class="nav-item"><label class="legend-chip"><input type="checkbox" id="cbCenter" checked> <span class="legend-dot" style="background:#0d7a42"></span> 地域包括</label></li>
      </ul>
      <div class="d-flex align-items-center gap-2 position-relative" id="searchWrap">
        <input type="search" id="searchBox" class="form-control"
               placeholder="事業所名・住所で検索" autocomplete="off" aria-label="事業所名または住所で検索">
        <div id="searchSuggest" class="list-group position-absolute" role="listbox"></div>
        <select id="selectArea" class="form-select" aria-label="圏域を選択">
          <option value="">圏域を選択…</option>
        </select>
        <label for="changeBaseMap" class="visually-hidden">背景地図</label>
        <select id="changeBaseMap" class="form-select" aria-label="背景地図を選択">
          <!-- options は JS で生成 -->
        </select>
      </div>
    </div>
  </nav>

  <!-- Map -->
  <div id="map"></div>

  <!-- Popup overlay -->
  <div id="popup" class="ol-popup">
    <a href="#" id="popup-closer" class="ol-popup-closer"></a>
    <div id="popup-title" class="popup-title"></div>
    <div id="popup-content" class="popup-content"></div>
  </div>

  <footer id="attribution-bar">

    <a href="https://nlftp.mlit.go.jp/ksj/" target="_blank" rel="noopener">国土数値情報</a>

  </footer>

  <script src="https://cdn.jsdelivr.net/npm/ol@10/dist/ol.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/ol_style.js"></script>
  <script src="js/hukushimap.js"></script>
  <script src="js/search.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
