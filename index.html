  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>枚方市 介護事業所マップ｜hukushimap</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10/ol.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

        <li class="nav-item"><label class="nav-link py-0"><input type="checkbox" id="cbKyotaku" checked> <span class="legend-dot" style="background:#4CAF50"></span> 居宅支援</label></li>
        <li class="nav-item"><label class="nav-link py-0"><input type="checkbox" id="cbDay" checked> <span class="legend-dot" style="background:#FF9800"></span> デイ</label></li>
        <li class="nav-item"><label class="nav-link py-0"><input type="checkbox" id="cbRiha" checked> <span class="legend-dot" style="background:#2196F3"></span> リハ</label></li>
        <li class="nav-item"><label class="nav-link py-0"><input type="checkbox" id="cbHoumon" checked> <span class="legend-dot" style="background:#9C27B0"></span> 訪問</label></li>
        <li class="nav-item"><label class="nav-link py-0"><input type="checkbox" id="cbTakinou" checked> <span class="legend-dot" style="background:#F44336"></span> 多機能</label></li>
        <li class="nav-item"><label class="nav-link py-0"><input type="checkbox" id="cbTanki" checked> <span class="legend-dot" style="background:#00BCD4"></span> 短期</label></li>
        <li class="nav-item"><label class="nav-link py-0"><input type="checkbox" id="cbShisetsu" checked> <span class="legend-dot" style="background:#795548"></span> 施設</label></li>
        <li class="nav-item"><label class="nav-link py-0"><input type="checkbox" id="cbYougu" checked> <span class="legend-dot" style="background:#607D8B"></span> 用具</label></li>
        <li class="nav-item ms-lg-2"><label class="nav-link py-0"><input type="checkbox" id="cbArea" checked> <i class="bi bi-square" style="color:#1BA466"></i> 圏域</label></li>
      </ul>
      <div class="d-flex align-items-center gap-2">
        <select id="selectArea" class="form-select form-select-sm" style="width:auto;font-size:.8rem;">
          <option value="">圏域を選択…</option>
        </select>
      </div>
    </div>
  </nav>

  <!-- Map -->
  <div id="map"></div>

  <!-- Popup overlay -->
  <div id="popup" class="ol-popup">
    <a href="#" id="popup-closer" class="ol-popup-closer"></a>
